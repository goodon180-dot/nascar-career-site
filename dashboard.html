<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0f;
      color: white;
    }

    nav {
      background: #d40000;
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 15px;
      font-weight: bold;
    }

    nav a {
      color: white;
      text-decoration: none;
    }

    nav a:hover {
      color: #ffcc00;
    }

    header {
      text-align: center;
      padding: 20px;
      font-size: 26px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #15151c;
      padding: 20px;
      border-radius: 10px;
    }

    .card h3 {
      color: #ffcc00;
      margin-bottom: 15px;
    }

    .list div {
      padding: 6px 0;
      border-bottom: 1px solid #2a2a35;
    }

    .list div:last-child {
      border-bottom: none;
    }

    a.driver {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    a.driver:hover {
      color: #ffcc00;
    }

    .cutline-divider {
      border-top: 2px solid #ffcc00;
      margin: 4px 0;
      opacity: 0.8;
    }

    .plus { color: #00ff6a; }
    .minus { color: #ff3b3b; }
    .neutral { color: white; }

  </style>
</head>

<body>

<nav>
  <a href="dashboard.html">Dashboard</a>
  <a href="standings.html">Standings</a>
  <a href="drivers.html">Drivers</a>
  <a href="results.html">Results</a>
</nav>

<header>DASHBOARD</header>

<div class="grid">

  <!-- TOP 10 -->
  <div class="card">
    <h3>📊 Top 10</h3>
    <div id="top10" class="list"></div>
  </div>

  <!-- CUTLINE -->
  <div class="card">
    <h3>🟡 Playoff Cutline</h3>
    <div id="cutline" class="list"></div>
  </div>

  <!-- STATS -->
  <div class="card">
    <h3>🔥 League Stats</h3>
    <div id="stats"></div>
  </div>

  <!-- LAST RACE -->
  <div class="card">
    <h3>🏁 Last Race - Indy Road Course</h3>
    <div class="list">
      <div>🥇 T. Reddick</div>
      <div>🥈 M. Truex Jr.</div>
      <div>🥉 SV. Gisbergen</div>
    </div>
  </div>

</div>

<script>

let data = [
  ["K. Larson",418,0,"+130",148,3],
  ["K. Busch",402,2,"+114",120,6],
  ["T. Reddick",398,2,"+110",139,5],
  ["A. Bowman",398,1,"+110",89,2],
  ["B. Keselowski",380,1,"+92",96,6],
  ["B. Wallace",351,0,"+63",24,2],
  ["A. Dillon",348,0,"+60",18,0],
  ["A. Cindric",346,0,"+58",88,3],
  ["W. Byron",325,1,"+37",42,3],
  ["J. Logano",324,1,"+36",112,3],
  ["C. Bell",323,0,"+35",67,3],
  ["T. Gibbs",315,1,"+27",75,2],
  ["D. Hamlin",310,2,"+22",44,3],
  ["R. Blaney",310,0,"+22",61,2],
  ["M. Truex Jr.",299,0,"+11",49,3],
  ["R. Chastain",294,1,"+6",62,2],

  ["J. Haley",288,0,"-6",13,1],
  ["J. Berry",284,0,"-10",27,0],
  ["C. Elliott",284,0,"-10",47,0],
  ["C. Buescher",272,0,"-22",30,0],
  ["E. Jones",270,1,"-24",29,2],
  ["C. Briscoe",262,0,"-32",6,0],
  ["N. Gragson",255,0,"-39",53,0],
  ["T. Goodon",249,0,"-45",7,1],
  ["D. Suarez",244,0,"-50",26,1],
  ["T. Dillon",243,0,"-51",16,0],
  ["R. Stenhouse Jr.",228,0,"-66",33,0],
  ["Z. Smithᴿ",227,0,"-67",36,0],
  ["R. Preece",220,0,"-74",0,0],
  ["C. LaJoie",215,0,"-79",48,0],
  ["A. Almirola",207,0,"-87",31,0],
  ["T. Gilliland",191,0,"-103",10,0],
  ["A. Allmendinger",184,0,"-110",9,0]
];

data.sort((a,b)=>b[1]-a[1]);

function driverLink(name){
  return `<a class="driver" href="drivers.html?name=${encodeURIComponent(name)}">${name}</a>`;
}

document.getElementById("top10").innerHTML =
  data.slice(0,10).map((d,i)=>
    `<div>${i+1}. ${driverLink(d[0])} — ${d[1]} pts</div>`
  ).join("");

document.getElementById("cutline").innerHTML =
  data.slice(12,20).map((d,i)=>{
    let cls = d[3].startsWith("+") ? "plus" : d[3].startsWith("-") ? "minus" : "neutral";

    let line = (d[0] === "R. Chastain")
      ? `<div class="cutline-divider"></div>`
      : "";

    return `
      <div>${driverLink(d[0])} <span class="${cls}">${d[3]}</span></div>
      ${line}
    `;
  }).join("");

let mostWins = [...data].sort((a,b)=>b[2]-a[2])[0];
let mostLaps = [...data].sort((a,b)=>b[4]-a[4])[0];
let mostTop5 = [...data].sort((a,b)=>b[5]-a[5])[0];

document.getElementById("stats").innerHTML = `
  🏆 Most Wins: ${driverLink(mostWins[0])} (${mostWins[2]})<br><br>
  🔥 Most Laps Led: ${driverLink(mostLaps[0])} (${mostLaps[4]})<br><br>
  ⭐ Most Top 5s: ${driverLink(mostTop5[0])} (${mostTop5[5]})
`;

</script>

</body>
</html>
