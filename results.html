<!DOCTYPE html>
<html>
<head>
  <title>Race Results</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0f;
      color: white;
    }

    header {
      background: #d40000;
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .container {
      padding: 20px;
    }

    input, select, button {
      padding: 8px;
      margin: 5px;
      border-radius: 5px;
      border: none;
      outline: none;
    }

    button {
      background: #ffcc00;
      font-weight: bold;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #15151c;
      margin-top: 15px;
    }

    th, td {
      padding: 8px;
      text-align: center;
      border-bottom: 1px solid #2a2a35;
    }

    th {
      background: #1f1f2a;
    }

    .topbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<header>RACE RESULTS CALCULATOR</header>

<div class="container">

  <div class="topbar">
    <input id="track" placeholder="Track name">
    <input id="date" type="date">
    <input id="laps" placeholder="Race Laps">

    <button onclick="calculateRace()">Calculate Race</button>
    <button onclick="saveRace()">Save Race</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Pos</th>
        <th>Driver</th>
        <th>Points</th>
      </tr>
    </thead>
    <tbody id="results"></tbody>
  </table>

</div>

<script>

let results = [];

// YOUR POINT SYSTEM
function getPoints(pos){
  if(pos === 1) return 40;
  if(pos === 2) return 35;
  if(pos === 3) return 34;
  if(pos === 4) return 33;
  if(pos === 5) return 32;
  if(pos <= 36) return 40 - (pos - 1);
  return 1;
}

// SAMPLE DRIVER LIST (replace with dropdown later if you want)
let drivers = [
  "K. Larson","K. Busch","T. Reddick","A. Bowman","B. Keselowski",
  "B. Wallace","A. Dillon","A. Cindric","W. Byron","J. Logano",
  "C. Bell","T. Gibbs","D. Hamlin","R. Blaney","M. Truex Jr.",
  "R. Chastain","J. Haley","J. Berry","C. Elliott","C. Buescher"
];

function calculateRace(){

  let tbody = document.getElementById("results");
  tbody.innerHTML = "";

  results = [];

  drivers.forEach((d,i)=>{

    let pos = i + 1;
    let pts = getPoints(pos);

    results.push({
      driver: d,
      points: pts
    });

    tbody.innerHTML += `
      <tr>
        <td>${pos}</td>
        <td>${d}</td>
        <td>${pts}</td>
      </tr>
    `;
  });
}

// 💾 SAVE + REDIRECT SYSTEM
function saveRace(){

  if(results.length === 0){
    alert("Please calculate race first");
    return;
  }

  let raceData = {
    track: document.getElementById("track").value || "Unknown Track",
    date: document.getElementById("date").value || "No Date",
    laps: document.getElementById("laps").value || "N/A",
    results: results
  };

  let history = JSON.parse(localStorage.getItem("raceHistory")) || [];
  history.push(raceData);

  localStorage.setItem("raceHistory", JSON.stringify(history));

  // 🚀 AUTO GO TO HISTORY PAGE
  window.location.href = "results-history.html";
}

</script>

</body>
</html>
