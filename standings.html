      text-align: center;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .container {
      padding: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #15151c;
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #2a2a35;
    }

    th {
      background: #1f1f2a;
      cursor: pointer;
      user-select: none;
    }

    th:hover {
      background: #2a2a3a;
    }

    tr:hover {

    }

    .highlight {
      color: #ffcc00;
      font-weight: bold;

  </style>
</head>

// ---- auto sort by points on load ----
data.sort((a,b) => b[2] - a[2]);

function renderTable() {
  const body = document.getElementById("body");
  body.innerHTML = "";

  data.forEach(row => {
    const tr = document.createElement("tr");

    row.forEach((cell, i) => {
      const td = document.createElement("td");
      td.textContent = cell;

      // highlight leader
      if (i === 2 && row[2] === data[0][2]) {
        td.classList.add("highlight");
      }

      tr.appendChild(td);
    });

    body.appendChild(tr);
  });
}

// ---- sorting ----
let sortDirection = true;

function sortTable(col) {
  data.sort((a, b) => {
    let x = a[col];
    let y = b[col];

    x = x === "" ? -9999 : x;
    y = y === "" ? -9999 : y;

    return sortDirection ? (y - x || (''+y).localeCompare(''+x)) : (x - y || (''+x).localeCompare(''+y));
  });

  sortDirection = !sortDirection;
  renderTable();
}

// initial render
