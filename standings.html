<!DOCTYPE html>
<html>
<head>
  <title>NASCAR Standings</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0f;
      color: white;
    }

    header {
      background: #d40000;
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .container {
      padding: 20px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    input, select {
      padding: 8px;
      border-radius: 5px;
      border: none;
      outline: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #15151c;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #2a2a35;
      cursor: pointer;
    }

    th {
      background: #1f1f2a;
    }

    tr:hover {
      background: #222232;
    }

    .highlight {
      color: #ffcc00;
      font-weight: bold;
    }

    /* CUT LINE */
    .cutline td {
      border-bottom: 3px solid #ffcc00;
    }

    /* MOVEMENT COLORS */
    .up { color: #00ff6a; font-weight: bold; }
    .down { color: #ff3b3b; font-weight: bold; }
    .neutral { color: white; }
  </style>
</head>

<body>

<header>NASCAR STANDINGS</header>

<div class="container">

  <div class="controls">
    <input id="search" placeholder="Search driver..." onkeyup="render()">

    <select id="winsFilter" onchange="render()">
      <option value="all">All Drivers</option>
      <option value="wins">Has Wins</option>
    </select>

    <select id="playoffFilter" onchange="render()">
      <option value="all">All</option>
      <option value="playoff">Playoff Cut (Top 16)</option>
    </select>
  </div>

  <table>
    <thead>
      <tr>
        <th onclick="sort(0)">Driver</th>
        <th onclick="sort(1)">Starts</th>
        <th onclick="sort(2)">Points</th>
        <th onclick="sort(3)">+/-</th>
        <th onclick="sort(4)">Wins</th>
        <th onclick="sort(5)">Top 5</th>
        <th onclick="sort(6)">Top 10</th>
        <th onclick="sort(7)">DNF</th>
        <th onclick="sort(8)">Laps Led</th>
        <th onclick="sort(9)">Playoff Pts</th>
        <th onclick="sort(10)">Stage Wins</th>
      </tr>
    </thead>

    <tbody id="body"></tbody>
  </table>

</div>

// ---------------- SORT ----------------
let dir = false;
let col = 2;

function sort(c){
  if(col === c) dir = !dir;
  else { col = c; dir = false; }

  data.sort((a,b)=>{
    let x = a[c], y = b[c];

    if(typeof x === "string") x = x.replace("+","") * 1;
    if(typeof y === "string") y = y.replace("+","") * 1;

    return dir ? x - y : y - x;
  });

  render();
}

// ---------------- RENDER ----------------
function render(){

  let body = document.getElementById("body");
  body.innerHTML = "";

  let search = document.getElementById("search").value.toLowerCase();
  let winsFilter = document.getElementById("winsFilter").value;
  let playoffFilter = document.getElementById("playoffFilter").value;

  let sorted = [...data].sort((a,b)=>b[2]-a[2]);

  let filtered = sorted.filter(d=>{
    let nameOk = d[0].toLowerCase().includes(search);
    let winOk = winsFilter==="wins" ? d[4]>0 : true;
    return nameOk && winOk;
  });

  filtered.forEach((d,i)=>{

    if(playoffFilter==="playoff" && i>=16) return;

    let tr = document.createElement("tr");

    if(i===16) tr.classList.add("cutline");

    let moveClass = "neutral";
    if(d[3].startsWith("+")) moveClass="up";
    else if(d[3].startsWith("-")) moveClass="down";

    tr.innerHTML = `
      <td>${d[0]}</td>
      <td>${d[1]}</td>
      <td class="${i===0?'highlight':''}">${d[2]}</td>
      <td class="${moveClass}">${d[3]}</td>
      <td>${d[4]}</td>
      <td>${d[5]}</td>
      <td>${d[6]}</td>
      <td>${d[7]}</td>
      <td>${d[8]}</td>
      <td>${d[9]}</td>
      <td>${d[10]}</td>
    `;

    body.appendChild(tr);
  });
}

render();

</script>
