<!DOCTYPE html>
<html>
<head>
  <title>Race Standings</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0f;
      color: white;
    }

    header {
      background: #d40000;
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .container {
      padding: 20px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    input, select {
      padding: 8px;
      border-radius: 5px;
      border: none;
      outline: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #15151c;
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #2a2a35;
    }

    th {
      background: #1f1f2a;
      cursor: pointer;
      user-select: none;
    }

    tr:hover {
      background: #222232;
    }

    .highlight {
      color: #ffcc00;
      font-weight: bold;
    }

    .cutline td {
      border-bottom: 3px solid #ffcc00;
    }

    .up {
      color: #00ff6a;
      font-weight: bold;
    }

    .down {
      color: #ff3b3b;
      font-weight: bold;
    }

    .neutral {
      color: white;
    }
  </style>
</head>

<body>

<header>RACE STANDINGS</header>

<div class="container">

  <div class="controls">
    <input id="search" placeholder="Search driver..." onkeyup="renderTable()">

    <select id="filterWins" onchange="renderTable()">
      <option value="all">All Drivers</option>
      <option value="wins">Has Wins</option>
    </select>

    <select id="filterPlayoff" onchange="renderTable()">
      <option value="all">All</option>
      <option value="playoff">Top 16 Cut Line</option>
    </select>
  </div>

  <table>
    <thead>
      <tr>
        <th onclick="sortTable(0)">Driver</th>
        <th onclick="sortTable(1)">Starts</th>
        <th onclick="sortTable(2)">Points</th>
        <th onclick="sortTable(3)">+/-</th>
        <th onclick="sortTable(4)">Wins</th>
        <th onclick="sortTable(5)">Top 5</th>
        <th onclick="sortTable(6)">Top 10</th>
        <th onclick="sortTable(7)">DNF</th>
        <th onclick="sortTable(8)">Laps Led</th>
        <th onclick="sortTable(9)">Playoff Pts</th>
        <th onclick="sortTable(10)">Stage Wins</th>
      </tr>
    </thead>

    <tbody id="body"></tbody>
  </table>

</div>

<script>

let data = [
  ["K. Larson",14,418,"+130",0,3,8,0,148,5,5],
  ["K. Busch",14,402,"+114",2,6,9,1,120,11,1],
  ["T. Reddick",14,398,"+110",2,5,7,0,139,11,1],
  ["A. Bowman",14,398,"+110",1,2,3,1,89,9,4],
  ["B. Keselowski",14,380,"+92",1,6,7,1,96,7,2],
  ["B. Wallace",14,351,"+63",0,2,5,0,24,0,0],
  ["A. Dillon",14,348,"+60",0,0,4,0,18,1,1],
  ["A. Cindric",14,346,"+58",0,3,6,0,88,2,2],
  ["W. Byron",14,325,"+37",1,3,3,0,42,5,0],
  ["J. Logano",14,324,"+36",1,3,5,0,112,6,1],
  ["C. Bell",14,323,"+35",0,3,6,1,67,2,2],
  ["T. Gibbs",14,315,"+27",1,2,4,1,75,5,0],
  ["D. Hamlin",14,310,"+22",2,3,5,1,44,10,0],
  ["R. Blaney",14,310,"+22",0,2,3,1,61,0,0],
  ["M. Truex Jr.",14,299,"+11",0,3,4,0,49,0,0],
  ["R. Chastain",14,294,"+6",1,2,3,0,62,5,0],

  ["J. Haley",14,288,"-6",0,1,4,0,13,1,1],
  ["J. Berry",14,284,"-10",0,2,6,2,27,0,0],
  ["C. Elliott",14,284,"-10",0,0,3,1,47,0,0],
  ["C. Buescher",14,272,"-22",0,1,3,2,30,0,0],

  ["E. Jones",14,270,"-24",1,2,3,0,29,6,1],
  ["C. Briscoe",14,262,"-32",0,2,3,0,6,0,0],
  ["N. Gragson",14,255,"-39",0,1,2,0,53,0,0],
  ["T. Goodon",14,249,"-45",0,0,3,2,7,1,1],
  ["D. Suarez",14,244,"-50",0,0,4,0,26,1,1],
  ["T. Dillon",14,243,"-51",0,0,2,0,16,0,0],

  ["Z. Smithᴿ",14,227,"-67",0,0,3,0,36,0,0],
  ["R. Preece",14,220,"-74",0,0,2,1,0,0,0],
  ["C. LaJoie",14,215,"-79",0,1,1,0,48,0,0],
  ["A. Almirola",14,207,"-87",0,1,1,0,31,0,0],
  ["T. Gilliland",14,191,"-103",0,2,2,1,10,0,0],
  ["A. Allmendinger",14,184,"-110",0,0,1,1,9,0,0],
  ["M. McDowell",14,175,"-119",0,1,2,1,49,2,2],
  ["B. McLeod",14,175,"-119",0,0,1,1,21,1,1],

  ["J. Johnson",5,138,"-",0,3,3,0,15,0,0],
  ["C. Hocevar",5,119,"-",0,1,1,0,48,1,1],
  ["SV. Gisbergen",3,80,"-",0,1,1,0,0,0,0],
  ["JH. Nemcheck",2,76,"-",0,1,1,0,5,0,0],
  ["R. Newman",5,72,"-",0,0,1,0,4,0,0],
  ["P. O'Ward",2,70,"-",1,1,1,0,11,6,1]
];

let sortDir = true;

function sortTable(col) {
  data.sort((a,b)=>{
    let x=a[col], y=b[col];

    if(typeof x==="string") x = x.replace("+","").replace("-","");
    if(typeof y==="string") y = y.replace("+","").replace("-","");

    return sortDir ? (y - x || (""+y).localeCompare(""+x)) : (x - y || (""+x).localeCompare(""+y));
  });

  sortDir = !sortDir;
  renderTable();
}

function renderTable(){

  let body=document.getElementById("body");
  body.innerHTML="";

  let search=document.getElementById("search").value.toLowerCase();
  let winsFilter=document.getElementById("filterWins").value;
  let playoffFilter=document.getElementById("filterPlayoff").value;

  let sorted=[...data].sort((a,b)=>b[2]-a[2]);

  let filtered=sorted.filter(d=>{
    let nameMatch=d[0].toLowerCase().includes(search);
    let winMatch=winsFilter==="wins"?d[4]>0:true;
    return nameMatch&&winMatch;
  });

  filtered.forEach((d,i)=>{

    if(playoffFilter==="playoff"&&i>=16)return;

    let tr=document.createElement("tr");

    if(i===15)tr.classList.add("cutline");

    let move=d[3];
    let moveClass="neutral";

    if(move.startsWith("+")) moveClass="up";
    else if(move.startsWith("-")) moveClass="down";
    else moveClass="neutral";

    tr.innerHTML=`
      <td>${d[0]}</td>
      <td>${d[1]}</td>
      <td class="${i===0?'highlight':''}">${d[2]}</td>
      <td class="${moveClass}">${move}</td>
      <td>${d[4]}</td>
      <td>${d[5]}</td>
      <td>${d[6]}</td>
      <td>${d[7]}</td>
      <td>${d[8]}</td>
      <td>${d[9]}</td>
      <td>${d[10]}</td>
    `;

    body.appendChild(tr);
  });
}

renderTable();

</script>

</body>
</html>
