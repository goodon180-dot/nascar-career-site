<!DOCTYPE html>
<html>
<head>
  <title>Race Standings</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0f;
      color: white;
    }

    header {
      background: #d40000;
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .container {
      padding: 20px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    input, select {
      padding: 8px;
      border-radius: 5px;
      border: none;
      outline: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #15151c;
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #2a2a35;
    }

    th {
      background: #1f1f2a;
      cursor: pointer;
      user-select: none;
    }

    tr:hover {
      background: #222232;
    }

    .highlight {
      color: #ffcc00;
      font-weight: bold;
    }

    .cutline td {
      border-bottom: 3px solid #ffcc00;
    }

    .up { color: #00ff6a; font-weight: bold; }
    .down { color: #ff3b3b; font-weight: bold; }
    .neutral { color: white; }
  </style>
</head>

<body>

<header>RACE STANDINGS</header>

<div class="container">

  <!-- CONTROLS -->
  <div class="controls">
    <input id="search" placeholder="Search driver..." onkeyup="renderTable()">

    <select id="filterWins" onchange="renderTable()">
      <option value="all">All Drivers</option>
      <option value="wins">Has Wins</option>
    </select>

    <select id="filterPlayoff" onchange="renderTable()">
      <option value="all">All</option>
      <option value="playoff">Top 16 Cut Line</option>
    </select>
  </div>

  <table>
    <thead>
      <tr>
        <th onclick="sortTable(0)">Driver</th>
        <th onclick="sortTable(1)">Starts</th>
        <th onclick="sortTable(2)">Points</th>
        <th onclick="sortTable(3)">+/-</th>
        <th onclick="sortTable(4)">Wins</th>
        <th onclick="sortTable(5)">Top 5</th>
        <th onclick="sortTable(6)">Top 10</th>
        <th onclick="sortTable(7)">DNF</th>
        <th onclick="sortTable(8)">Laps Led</th>
        <th onclick="sortTable(9)">Playoff Pts</th>
        <th onclick="sortTable(10)">Stage Wins</th>
      </tr>
    </thead>

    <tbody id="body"></tbody>
  </table>

</div>

<script src="data.js"></script>

<script>

// ---------------- DATA (fallback if no data.js) ----------------
let data = window.driversArray || [
  ["K. Larson",14,418,"+130",0,3,8,0,148,5,5],
  ["K. Busch",14,402,"+114",2,6,9,1,120,11,1],
  ["T. Reddick",14,398,"+110",2,5,7,0,139,11,1],
  ["A. Bowman",14,398,"+110",1,2,3,1,89,9,4],
  ["B. Keselowski",14,380,"+92",1,6,7,1,96,7,2],
  ["B. Wallace",14,351,"+63",0,2,5,0,24,0,0],
  ["A. Dillon",14,348,"+60",0,0,4,0,18,1,1],
  ["A. Cindric",14,346,"+58",0,3,6,0,88,2,2],
  ["W. Byron",14,325,"+37",1,3,3,0,42,5,0],
  ["J. Logano",14,324,"+36",1,3,5,0,112,6,1],
  ["C. Bell",14,323,"+35",0,3,6,1,67,2,2],
  ["T. Gibbs",14,315,"+27",1,2,4,1,75,5,0],
  ["D. Hamlin",14,310,"+22",2,3,5,1,44,10,0],
  ["R. Blaney",14,310,"+22",0,2,3,1,61,0,0],
  ["M. Truex Jr.",14,299,"+11",0,3,4,0,49,0,0],
  ["R. Chastain",14,294,"+6",1,2,3,0,62,5,0]
];

// ---------------- SORT ----------------
let sortCol = 2;
let asc = false;

function clean(v){
  if(v === "-" || v === "" || v == null) return -999999;
  if(typeof v === "string") return Number(v.replace("+","")) || 0;
  return v;
}

function sortTable(col){

  if(sortCol === col){
    asc = !asc;
  } else {
    sortCol = col;
    asc = false;
  }

  data.sort((a,b)=>{
    let x = clean(a[col]);
    let y = clean(b[col]);
    return asc ? x - y : y - x;
  });

  renderTable();
}

// ---------------- RENDER ----------------
function renderTable(){

  let body = document.getElementById("body");
  body.innerHTML = "";

  let search = document.getElementById("search").value.toLowerCase();
  let winsFilter = document.getElementById("filterWins").value;
  let playoffFilter = document.getElementById("filterPlayoff").value;

  let filtered = data.filter(d=>{
    let nameMatch = d[0].toLowerCase().includes(search);
    let winsMatch = winsFilter === "wins" ? d[4] > 0 : true;
    return nameMatch && winsMatch;
  });

  filtered.forEach((d,i)=>{

    if(playoffFilter === "playoff" && i >= 16) return;

    let tr = document.createElement("tr");

    if(i === 15) tr.classList.add("cutline");

    let move = d[3];
    let moveClass = "neutral";

    if(String(move).startsWith("+")) moveClass = "up";
    else if(String(move).startsWith("-")) moveClass = "down";

    tr.innerHTML = `
      <td>
        <a href="driver.html?name=${encodeURIComponent(d[0])}" style="color:white; text-decoration:none;">
          ${d[0]}
        </a>
      </td>
      <td>${d[1]}</td>
      <td class="${i===0?'highlight':''}">${d[2]}</td>
      <td class="${moveClass}">${move}</td>
      <td>${d[4]}</td>
      <td>${d[5]}</td>
      <td>${d[6]}</td>
      <td>${d[7]}</td>
      <td>${d[8]}</td>
      <td>${d[9]}</td>
      <td>${d[10]}</td>
    `;

    body.appendChild(tr);
  });
}

renderTable();

</script>

</body>
</html>
