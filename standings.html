<!DOCTYPE html>
<html>
<head>
  <title>Race Standings</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0f;
      color: white;
    }

    header {
      background: #d40000;
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .container {
      padding: 20px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    input, select {
      padding: 8px;
      border-radius: 5px;
      border: none;
      outline: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #15151c;
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #2a2a35;
    }

    th {
      background: #1f1f2a;
      cursor: pointer;
      user-select: none;
    }

    tr:hover {
      background: #222232;
    }

    .highlight {
      color: #ffcc00;
      font-weight: bold;
    }

    /* 🟡 PLAYOFF CUT LINE */
    .cutline {
      border-top: 3px solid #ffcc00;
    }

    /* rookie highlight */
    .rookie {
      color: #00d4ff;
    }
  </style>
</head>

<body>

<header>RACE STANDINGS</header>

<div class="container">

  <!-- CONTROLS -->
  <div class="controls">
    <input id="search" placeholder="Search driver..." onkeyup="renderTable()">

    <select id="filterWins" onchange="renderTable()">
      <option value="all">All Drivers</option>
      <option value="wins">Has Wins</option>
    </select>

    <select id="filterPlayoff" onchange="renderTable()">
      <option value="all">All</option>
      <option value="playoff">Top 16 (Playoff Cut)</option>
    </select>
  </div>

  <table>
    <thead>
      <tr>
        <th onclick="sortTable(0)">Driver</th>
        <th onclick="sortTable(1)">Starts</th>
        <th onclick="sortTable(2)">Points</th>
        <th onclick="sortTable(3)">+/-</th>
        <th onclick="sortTable(4)">Wins</th>
        <th onclick="sortTable(5)">Top 5</th>
        <th onclick="sortTable(6)">Top 10</th>
        <th onclick="sortTable(7)">DNF</th>
        <th onclick="sortTable(8)">Laps Led</th>
        <th onclick="sortTable(9)">Playoff</th>
        <th onclick="sortTable(10)">Stage</th>
      </tr>
    </thead>

    <tbody id="body"></tbody>
  </table>
</div>

<script>

let data = [
  ["K. Larson",14,418,"+130","",3,8,"",148,5,5],
  ["K. Busch",14,402,"+114",2,6,9,1,120,11,1],
  ["T. Reddick",14,398,"+110",2,5,7,"",139,11,1],
  ["A. Bowman",14,398,"+110",1,2,3,1,89,9,4],
  ["B. Keselowski",14,380,"+92",1,6,7,1,96,7,2],
  ["B. Wallace",14,351,"+63","",2,5,"",24,"",""],
  ["A. Dillon",14,348,"+60","","",4,"",18,1,1],
  ["A. Cindric",14,346,"+58","",3,6,"",88,2,2],
  ["W. Byron",14,325,"+37",1,3,3,"",42,5,""],
  ["J. Logano",14,324,"+36",1,3,5,"",112,6,1],
  ["C. Bell",14,323,"+35","",3,6,1,67,2,2],
  ["T. Gibbs",14,315,"+27",1,2,4,1,75,5,""],
  ["D. Hamlin",14,310,"+22",2,3,5,1,44,10,""],
  ["R. Blaney",14,310,"+22","",2,3,1,61,"",""],
  ["M. Truex Jr.",14,299,"+11","",3,4,"",49,"",""],
  ["R. Chastain",14,294,"+6",1,2,3,"",62,5,""],
  ["J. Haley",14,288,"-6","",1,4,"",13,1,1],
  ["J. Berry",14,284,"-10","",2,6,2,27,"",""],

  ["C. Buescher",14,272,"-22","",1,3,2,30,"",""],
  ["E. Jones",14,270,"-24",1,2,3,"",29,6,1],
  ["C. Briscoe",14,262,"-32","",2,3,"",6,"",""],
  ["N. Gragson",14,255,"-39","",1,2,"",53,"",""],
  ["T. Goodon",14,249,"-45","","",3,2,7,1,1],
  ["D. Suarez",14,244,"-50","","",4,"",26,1,1],
  ["T. Dillon",14,243,"-51","","",2,"",16,"",""],
  ["R. Stenhouse Jr.",14,228,"-66","","",1,1,33,"",""],

];

// sort by points initially
data.sort((a,b) => b[2] - a[2]);

let sortDir = true;

function sortTable(col) {
  data.sort((a,b) => sortDir ? (b[col]-a[col]) : (a[col]-b[col]));
  sortDir = !sortDir;
  renderTable();
}

function renderTable() {
  let body = document.getElementById("body");
  body.innerHTML = "";

  let search = document.getElementById("search").value.toLowerCase();
  let winsFilter = document.getElementById("filterWins").value;
  let playoffFilter = document.getElementById("filterPlayoff").value;

  let sorted = [...data].sort((a,b) => b[2] - a[2]);

  let filtered = sorted.filter(d => {
    let nameMatch = d[0].toLowerCase().includes(search);
    let winsMatch = winsFilter === "wins" ? d[4] > 0 : true;
    return nameMatch && winsMatch;
  });

  filtered.forEach((d,i) => {

    // playoff filter
    if (playoffFilter === "playoff" && i >= 16) return;

    let tr = document.createElement("tr");

    // 🟡 CUT LINE
    if (i === 16) tr.classList.add("cutline");

    tr.innerHTML = `
      <td>${d[0]}</td>
      <td>${d[1]}</td>
      <td class="${i===0?'highlight':''}">${d[2]}</td>
      <td>${d[3]}</td>
      <td>${d[4]}</td>
      <td>${d[5]}</td>
      <td>${d[6]}</td>
      <td>${d[7]}</td>
      <td>${d[8]}</td>
      <td>${d[9]}</td>
      <td>${d[10]}</td>
    `;

    body.appendChild(tr);
  });
}

renderTable();

</script>

</body>
</html>
